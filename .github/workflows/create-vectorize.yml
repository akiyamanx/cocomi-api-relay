# 一時ワークフロー: Vectorizeインデックス作成
# Termuxでwranglerが使えないため、GitHub Actions経由で作成
# 実行完了後にこのファイルは削除すること
name: Create Vectorize Index

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/create-vectorize.yml'

jobs:
  create-index:
    runs-on: ubuntu-latest
    name: Create Vectorize Index
    steps:
      - uses: actions/checkout@v4

      - name: Create Vectorize Index
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: vectorize create cocomi-memory-vectors --dimensions=768 --metric=cosine
