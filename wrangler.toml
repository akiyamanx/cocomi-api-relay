# cocomi-api-relay - COCOMI API中継Worker
# COCOMITalk Step 1: 全APIキーをWorkerに集約し、フロントからキーを隠す
# v1.0 作成 2026-03-07

name = "cocomi-api-relay"
main = "src/index.js"
compatibility_date = "2026-03-07"

[vars]
ALLOWED_ORIGIN = "https://akiyamanx.github.io"
# 実際のWorker URL: https://cocomi-api-relay.k-akiyaman.workers.dev

# Secretsはwranglerコマンドで設定（絶対にここに書かない！）
# wrangler secret put GEMINI_API_KEY
# wrangler secret put OPENAI_API_KEY
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put COCOMI_AUTH_TOKEN

# v1.3追加 - Step 4 メモリーKV
# 事前にKV名前空間を作成する必要あり:
#   wrangler kv namespace create COCOMI_MEMORY
# 作成後に表示されるidをここに貼り付ける
[[kv_namespaces]]
binding = "COCOMI_MEMORY"
id = "acef21eea4804b97ba749b71124f98c8"

# v1.9追加 - Step 6 Phase 2: D1データベース
# 事前にD1データベースを作成する必要あり:
#   wrangler d1 create cocomi-memory
# 作成後に表示されるdatabase_idをここに貼り付ける
# KVバインディングは移行完了後もロールバック用に残す
[[d1_databases]]
binding = "DB"
database_name = "cocomi-memory"
database_id = "1b164b3b-a737-4721-aa07-86d6c821c8e6"

# v2.1追加 - Step 6 Phase 2: Vectorize RAG（意味検索）
# 事前にVectorizeインデックスを作成する必要あり:
#   npx wrangler vectorize create cocomi-memory-vectors --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "cocomi-memory-vectors"
