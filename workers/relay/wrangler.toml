# cocomi-api-relay - COCOMI API中継Worker
# モノレポ移行後のrelay Worker設定
# v2.7 モノレポ化対応

name = "cocomi-api-relay"
main = "index.js"
compatibility_date = "2026-03-07"

[vars]
ALLOWED_ORIGIN = "https://akiyamanx.github.io"
# 実際のWorker URL: https://cocomi-api-relay.k-akiyaman.workers.dev

# Secretsはwranglerコマンドで設定（絶対にここに書かない！）
# wrangler secret put GEMINI_API_KEY
# wrangler secret put OPENAI_API_KEY
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put COCOMI_AUTH_TOKEN

# KV名前空間（メモリーKV — ロールバック用に残存）
[[kv_namespaces]]
binding = "COCOMI_MEMORY"
id = "acef21eea4804b97ba749b71124f98c8"

# D1データベース（cocomi-memory）
[[d1_databases]]
binding = "DB"
database_name = "cocomi-memory"
database_id = "1b164b3b-a737-4721-aa07-86d6c821c8e6"

# Vectorize RAG（意味検索）
[[vectorize]]
binding = "VECTORIZE"
index_name = "cocomi-memory-vectors"
